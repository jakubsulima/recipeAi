services:
  backend:
    build:
      context: ./backendApi
      dockerfile: Dockerfile
    restart: unless-stopped
    # No public ports: expose through Dokploy or an edge proxy.
    environment:
      POSTGRES_URL: "jdbc:postgresql://${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      TRUSTED_PROXY_IPS: "${TRUSTED_PROXY_IPS:-}"
      JWT_COOKIE_SECURE: "${JWT_COOKIE_SECURE:-true}"
      JWT_COOKIE_SAME_SITE: "${JWT_COOKIE_SAME_SITE:-Lax}"
      FREE_PLAN_RECIPE_LIMIT: "${FREE_PLAN_RECIPE_LIMIT:-75}"
      PAID_PLAN_RECIPE_LIMIT: "${PAID_PLAN_RECIPE_LIMIT:--1}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 10s bash -c '</dev/tcp/localhost/8080' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - recipe-net

  frontend:
    build:
      context: ./frontend/recipeai
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-/api/}"
        VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-}"
    restart: unless-stopped
    # No public ports: expose through Dokploy or an edge proxy.
    environment:
      VITE_API_URL: "${VITE_API_URL:-/api/}"
      VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-}"
      PORT: "${FRONTEND_PORT:-8080}"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:$${PORT} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - recipe-net

  db:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    # Port intentionally not exposed — backend accesses DB via internal Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recipe-net

volumes:
  postgres_data:

networks:
  recipe-net:
    driver: bridge
