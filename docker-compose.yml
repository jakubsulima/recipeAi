services:
  backend:
    image: "${BACKEND_IMAGE:-ghcr.io/change-me/recipeai-backend:latest}"
    pull_policy: always
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    # No public ports: expose through Dokploy or an edge proxy.
    environment:
      POSTGRES_URL: "jdbc:postgresql://${POSTGRES_HOST:-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      SPRING_PROFILES_ACTIVE: "${SPRING_PROFILES_ACTIVE:-prod}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID:-}"
      TRUSTED_PROXY_IPS: "${TRUSTED_PROXY_IPS:-}"
      JWT_COOKIE_SECURE: "${JWT_COOKIE_SECURE:-true}"
      JWT_COOKIE_SAME_SITE: "${JWT_COOKIE_SAME_SITE:-Lax}"
      FREE_PLAN_RECIPE_LIMIT: "${FREE_PLAN_RECIPE_LIMIT:-75}"
      PAID_PLAN_RECIPE_LIMIT: "${PAID_PLAN_RECIPE_LIMIT:--1}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 10s bash -c '</dev/tcp/localhost/8080' || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - recipe-net

  frontend:
    image: "${FRONTEND_IMAGE:-ghcr.io/change-me/recipeai-frontend:latest}"
    pull_policy: always
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # No public ports: expose through Dokploy or an edge proxy.
    environment:
      PORT: "${FRONTEND_PORT:-8080}"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.recipeai-front.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.recipeai-front.entrypoints=websecure"
      - "traefik.http.routers.recipeai-front.tls=true"
      - "traefik.http.routers.recipeai-front.tls.certresolver=letsencrypt"
      - "traefik.http.routers.recipeai-front-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.recipeai-front-http.entrypoints=web"
      - "traefik.http.routers.recipeai-front-http.middlewares=recipeai-redirect-to-https"
      - "traefik.http.middlewares.recipeai-redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.recipeai-redirect-to-https.redirectscheme.permanent=true"
      - "traefik.http.services.recipeai-front.loadbalancer.server.port=${FRONTEND_PORT:-8080}"
      - "traefik.docker.network=dokploy-network"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:$${PORT} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - recipe-net
      - dokploy-network

  db:
    image: "${DB_IMAGE:-ghcr.io/change-me/recipeai-db:latest}"
    pull_policy: always
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    # Port intentionally not exposed — backend accesses DB via internal Docker network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - recipe-net

volumes:
  postgres_data:

networks:
  recipe-net:
    driver: bridge
  dokploy-network:
    external: true
