# Rate limiting zone for auth endpoints (10 requests per minute per IP)
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# Block 1: Handles HTTP traffic
server {
    listen 80;
    # IMPORTANT: Replace with your actual domain
    server_name recipeai.ddns.net;

    # This location is used by Certbot to prove you own the domain
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # For all other HTTP requests, redirect them to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Block 2: Handles HTTPS traffic
server {
    listen 443 ssl;
    # IMPORTANT: Replace with your actual domain
    server_name recipeai.ddns.net;

    # Path to the SSL certificates that Certbot will create
    ssl_certificate /etc/letsencrypt/live/recipeai.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recipeai.ddns.net/privkey.pem;
    resolver 127.0.0.11 valid=30s;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Location for API calls
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Rate-limited auth endpoints
    location /api/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8080/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/register {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8080/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Location for all other requests (your frontend)
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
