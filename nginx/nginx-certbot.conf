# This is a temporary configuration just for the Certbot challenge.
server {
    listen 80;
    server_name recipeai.ddns.net;

    # This is the only part that matters for Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Add a temporary response so we can test if it's working
    location / {
        return 200 'Temporary Nginx for Certbot is running.';
        add_header Content-Type text/plain;
    }
}
