name: CI Docker Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Run ESLint
        working-directory: frontend/recipeai
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Build frontend
        working-directory: frontend/recipeai
        run: npm run build

  frontend-audit:
    name: Frontend Audit Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Generate npm audit report
        working-directory: frontend/recipeai
        shell: bash
        run: |
          set -euo pipefail
          npm audit --audit-level=high --json > npm-audit.json || true

      - name: Fail on critical npm vulnerabilities
        working-directory: frontend/recipeai
        shell: bash
        run: |
          set -euo pipefail
          critical_count="$(node -e "const report = require('./npm-audit.json'); const critical = report?.metadata?.vulnerabilities?.critical ?? 0; process.stdout.write(String(critical));")"
          if [ "$critical_count" != "0" ]; then
            echo "Critical npm vulnerabilities found: $critical_count"
            exit 1
          fi

      - name: Upload npm audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-frontend
          path: frontend/recipeai/npm-audit.json
          if-no-files-found: error

  backend-compile:
    name: Backend Compile
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Compile backend
        working-directory: backendApi
        run: ./gradlew compileJava --no-daemon -Dorg.gradle.vfs.watch=false


  backend-testcontainers:
    name: Backend Testcontainers Integration (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run Testcontainers-style integration tests when present
        shell: bash
        run: |
          set -euo pipefail
          if find backendApi/src/test/java -name '*IT.java' | grep -q .; then
            cd backendApi
            ./gradlew test --tests '*IT' --no-daemon -Dorg.gradle.vfs.watch=false
          else
            echo "No *IT.java integration tests found. Skipping Testcontainers check."
          fi

  dockerfile-lint:
    name: Dockerfile Lint (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - backendApi/Dockerfile
          - frontend/recipeai/Dockerfile
          - postgres/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config >/dev/null

  image-security-scan:
    name: Image Security (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - frontend-lint
      - frontend-build
      - frontend-audit
      - backend-compile
      - compose-validate
      - dockerfile-lint
      - secret-scan
    strategy:
      fail-fast: false
      matrix:
        image_name:
          - backend
          - frontend
          - db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.image_name }}" in
            backend)
              docker build --pull -f backendApi/Dockerfile backendApi -t recipeai-scan:backend
              ;;
            frontend)
              docker build --pull -f frontend/recipeai/Dockerfile frontend/recipeai \
                --build-arg VITE_API_URL="${{ vars.VITE_API_URL || '/api/' }}" \
                --build-arg VITE_GOOGLE_CLIENT_ID="${{ vars.VITE_GOOGLE_CLIENT_ID }}" \
                -t recipeai-scan:frontend
              ;;
            db)
              docker build --pull -f postgres/Dockerfile postgres -t recipeai-scan:db
              ;;
            *)
              echo "Unsupported image '${{ matrix.image_name }}'"
              exit 1
              ;;
          esac

      - name: Trivy CRITICAL gate
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: recipeai-scan:${{ matrix.image_name }}
          format: table
          scanners: vuln
          pkg-types: os,library
          severity: CRITICAL
          ignore-unfixed: false
          exit-code: "1"

      - name: Trivy HIGH+CRITICAL report
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: recipeai-scan:${{ matrix.image_name }}
          format: table
          output: trivy-${{ matrix.image_name }}.txt
          scanners: vuln
          pkg-types: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "0"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.image_name }}
          path: trivy-${{ matrix.image_name }}.txt
          if-no-files-found: warn

  docker-images:
    name: Docker Build (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    needs:
      - image-security-scan
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            context: ./backendApi
            dockerfile: ./backendApi/Dockerfile
            build_args: ""
          - image_name: frontend
            context: ./frontend/recipeai
            dockerfile: ./frontend/recipeai/Dockerfile
            build_args: |
              VITE_API_URL=${{ vars.VITE_API_URL || '/api/' }}
              VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          - image_name: db
            context: ./postgres
            dockerfile: ./postgres/Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: prep
        shell: bash
        env:
          INPUT_IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          INPUT_IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          registry="${INPUT_IMAGE_REGISTRY:-ghcr.io}"
          namespace="${INPUT_IMAGE_NAMESPACE:-$owner}"
          namespace="$(echo "${namespace}" | tr '[:upper:]' '[:lower:]')"

          {
            echo "registry=${registry}"
            echo "namespace=${namespace}"
            echo "owner=${owner}"
            echo "repo=${repo}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate private registry credentials
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry != 'ghcr.io'
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ]; then
            echo "Missing required secrets for private registry login."
            echo "Set REGISTRY_USERNAME and REGISTRY_PASSWORD in repository Secrets and variables > Actions."
            exit 1
          fi

      - name: Log in to private registry
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.registry }}/${{ steps.prep.outputs.namespace }}/${{ steps.prep.outputs.repo }}-${{ matrix.image_name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          pull: true
          push: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max
