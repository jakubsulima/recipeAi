name: CI Docker Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Build frontend
        working-directory: frontend/recipeai
        run: npm run build

  backend-compile:
    name: Backend Compile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Compile backend
        working-directory: backendApi
        run: ./gradlew compileJava --no-daemon -Dorg.gradle.vfs.watch=false

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config >/dev/null

  docker-images:
    name: Docker Build (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - backend-compile
      - compose-validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            context: ./backendApi
            dockerfile: ./backendApi/Dockerfile
            build_args: ""
          - image_name: frontend
            context: ./frontend/recipeai
            dockerfile: ./frontend/recipeai/Dockerfile
            build_args: |
              VITE_API_URL=/api/
              VITE_GOOGLE_CLIENT_ID=${{ vars.VITE_GOOGLE_CLIENT_ID }}
          - image_name: db
            context: ./postgres
            dockerfile: ./postgres/Dockerfile
            build_args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: prep
        shell: bash
        env:
          INPUT_IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          INPUT_IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          registry="${INPUT_IMAGE_REGISTRY:-ghcr.io}"
          namespace="${INPUT_IMAGE_NAMESPACE:-$owner}"
          namespace="$(echo "${namespace}" | tr '[:upper:]' '[:lower:]')"

          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "namespace=${namespace}" >> "$GITHUB_OUTPUT"
          echo "owner=${owner}" >> "$GITHUB_OUTPUT"
          echo "repo=${repo}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate private registry credentials
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry != 'ghcr.io'
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ]; then
            echo "Missing required secrets for private registry login."
            echo "Set REGISTRY_USERNAME and REGISTRY_PASSWORD in repository Secrets and variables > Actions."
            exit 1
          fi

      - name: Log in to private registry
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ steps.prep.outputs.registry }}/${{ steps.prep.outputs.namespace }}/${{ steps.prep.outputs.repo }}-${{ matrix.image_name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref_name == github.event.repository.default_branch }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max