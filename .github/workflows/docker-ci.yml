name: CI Docker Pipeline

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Run ESLint
        working-directory: frontend/recipeai
        run: npm run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Build frontend
        working-directory: frontend/recipeai
        run: npm run build

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Run TypeScript typecheck
        working-directory: frontend/recipeai
        run: npm run typecheck

  frontend-unused-code:
    name: Frontend Unused Code (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Run Knip
        working-directory: frontend/recipeai
        run: npm run unused

  duplicate-code:
    name: Duplicate Code (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Run jscpd
        working-directory: frontend/recipeai
        run: npm run duplicates

      - name: Upload duplicate-code report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: duplicate-code-report
          path: reports/jscpd
          if-no-files-found: warn

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend/recipeai
        run: npm run test -- --run

  frontend-audit:
    name: Frontend Audit Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/recipeai/package-lock.json

      - name: Install dependencies
        working-directory: frontend/recipeai
        run: npm ci

      - name: Generate npm audit report
        working-directory: frontend/recipeai
        shell: bash
        run: |
          set -euo pipefail
          npm audit --audit-level=high --json > npm-audit.json || true

      - name: Fail on high or critical npm vulnerabilities
        working-directory: frontend/recipeai
        shell: bash
        run: |
          set -euo pipefail
          high_count="$(node -e "const report = require('./npm-audit.json'); const high = report?.metadata?.vulnerabilities?.high ?? 0; process.stdout.write(String(high));")"
          critical_count="$(node -e "const report = require('./npm-audit.json'); const critical = report?.metadata?.vulnerabilities?.critical ?? 0; process.stdout.write(String(critical));")"
          if [ "$high_count" != "0" ] || [ "$critical_count" != "0" ]; then
            echo "High npm vulnerabilities found: $high_count"
            echo "Critical npm vulnerabilities found: $critical_count"
            exit 1
          fi

      - name: Upload npm audit artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: npm-audit-frontend
          path: frontend/recipeai/npm-audit.json
          if-no-files-found: error

  backend-compile:
    name: Backend Compile
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Compile backend
        working-directory: backendApi
        run: ./gradlew compileJava --no-daemon -Dorg.gradle.vfs.watch=false

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run backend tests
        working-directory: backendApi
        run: ./gradlew test --no-daemon -Dorg.gradle.vfs.watch=false

  backend-unused-code:
    name: Backend Unused Code (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run PMD unused-code rules
        working-directory: backendApi
        run: ./gradlew unusedJava --no-daemon -Dorg.gradle.vfs.watch=false

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pmd-unused-java-report
          path: backendApi/build/reports/pmd
          if-no-files-found: warn

  backend-testcontainers:
    name: Backend Testcontainers Integration (Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run Testcontainers-style integration tests when present
        shell: bash
        run: |
          set -euo pipefail
          if find backendApi/src/test/java -name '*IT.java' | grep -q .; then
            cd backendApi
            ./gradlew test --tests '*IT' --no-daemon -Dorg.gradle.vfs.watch=false
          else
            echo "No *IT.java integration tests found. Skipping Testcontainers check."
          fi

  dockerfile-lint:
    name: Dockerfile Lint (${{ matrix.dockerfile }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - backendApi/Dockerfile
          - frontend/recipeai/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
        with:
          dockerfile: ${{ matrix.dockerfile }}

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  compose-validate:
    name: Compose Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config >/dev/null

  codeql-analysis:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
          - language: java-kotlin

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17
        with:
          languages: ${{ matrix.language }}

      - name: Setup Java 17
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Build backend for CodeQL
        if: matrix.language == 'java-kotlin'
        working-directory: backendApi
        run: ./gradlew compileJava --no-daemon -Dorg.gradle.vfs.watch=false

      - name: Analyze CodeQL
        uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17

  docker-images:
    name: Docker Build (${{ matrix.image_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    needs:
      - frontend-lint
      - frontend-build
      - frontend-typecheck
      - frontend-test
      - frontend-audit
      - backend-compile
      - backend-test
      - compose-validate
      - dockerfile-lint
      - secret-scan
      - codeql-analysis
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: backend
            context: ./backendApi
            dockerfile: ./backendApi/Dockerfile
            build_args: ""
          - image_name: frontend
            context: ./frontend/recipeai
            dockerfile: ./frontend/recipeai/Dockerfile
            build_args: |
              VITE_API_URL=${{ vars.VITE_API_URL || '/api/' }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Prepare image names
        id: prep
        shell: bash
        env:
          INPUT_IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
          INPUT_IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          registry="${INPUT_IMAGE_REGISTRY:-ghcr.io}"
          namespace="${INPUT_IMAGE_NAMESPACE:-$owner}"
          namespace="$(echo "${namespace}" | tr '[:upper:]' '[:lower:]')"

          {
            echo "registry=${registry}"
            echo "namespace=${namespace}"
            echo "owner=${owner}"
            echo "repo=${repo}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry == 'ghcr.io'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate private registry credentials
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry != 'ghcr.io'
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ]; then
            echo "Missing required secrets for private registry login."
            echo "Set REGISTRY_USERNAME and REGISTRY_PASSWORD in repository Secrets and variables > Actions."
            exit 1
          fi

      - name: Log in to private registry
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch && steps.prep.outputs.registry != 'ghcr.io'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ steps.prep.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: |
            ${{ steps.prep.outputs.registry }}/${{ steps.prep.outputs.namespace }}/${{ steps.prep.outputs.repo }}-${{ matrix.image_name }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image with cache export
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          pull: true
          load: true
          push: false
          tags: |
            ${{ steps.meta.outputs.tags }}
            recipeai-scan:${{ matrix.image_name }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,scope=${{ matrix.image_name }},mode=max

      - name: Build image with read-only cache
        if: github.event_name != 'push' || github.ref_name != github.event.repository.default_branch
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          pull: true
          load: true
          push: false
          tags: |
            ${{ steps.meta.outputs.tags }}
            recipeai-scan:${{ matrix.image_name }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image_name }}

      - name: Trivy CRITICAL gate
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: recipeai-scan:${{ matrix.image_name }}
          format: table
          scanners: vuln
          pkg-types: os,library
          severity: CRITICAL
          ignore-unfixed: false
          exit-code: "1"

      - name: Trivy HIGH+CRITICAL report
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: recipeai-scan:${{ matrix.image_name }}
          format: table
          output: trivy-${{ matrix.image_name }}.txt
          scanners: vuln
          pkg-types: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: "0"

      - name: Upload security report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: trivy-${{ matrix.image_name }}
          path: trivy-${{ matrix.image_name }}.txt
          if-no-files-found: warn

      - name: Push image tags
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        shell: bash
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            if [ -n "$tag" ]; then
              docker push "$tag"
            fi
          done <<< "$IMAGE_TAGS"

  dokploy-deploy:
    name: Trigger Dokploy Deploy
    runs-on: ubuntu-latest
    needs:
      - docker-images
    if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch

    steps:
      - name: Check commit is from merged PR
        id: merge-check
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          script: |
            const response = await github.request(
              'GET /repos/{owner}/{repo}/commits/{commit_sha}/pulls',
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              }
            );

            const defaultBranch = context.payload.repository.default_branch;
            const mergedIntoDefault = response.data.some(
              (pr) => pr.merged_at && pr.base && pr.base.ref === defaultBranch
            );

            core.setOutput('merged_pr', mergedIntoDefault ? 'true' : 'false');

            if (!mergedIntoDefault) {
              core.notice('Skipping Dokploy deployment: push is not associated with a merged PR into the default branch.');
            }

      - name: Trigger Dokploy deployment webhook
        if: steps.merge-check.outputs.merged_pr == 'true'
        env:
          DOKPLOY_WEBHOOK: ${{ secrets.DOKPLOY_WEBHOOK }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DOKPLOY_WEBHOOK}" ]; then
            echo "Missing DOKPLOY_WEBHOOK secret"
            exit 1
          fi

          curl --fail --show-error --silent --location \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -d "{\"ref\":\"refs/heads/${DEFAULT_BRANCH}\"}" \
            "${DOKPLOY_WEBHOOK}"
