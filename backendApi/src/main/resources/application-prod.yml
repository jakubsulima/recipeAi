server:
  address: 0.0.0.0
  port: ${PORT:8080} # Use environment variable for cloud deployment
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate # Never use 'update' in production
    show-sql: false # Disable SQL logging
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.web: WARN
    org.jakub.backendapi: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

gemini:
  api:
    model: gemini-3.1-flash-lite-preview

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

oauth:
  google:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID}

allowed:
  origins: ${ALLOWED_ORIGINS:http://localhost:3000}

security:
  trusted-proxy-ips: ${TRUSTED_PROXY_IPS:}
  jwt:
    token:
      secret-key: ${JWT_SECRET_KEY}
    cookie:
      secure: ${JWT_COOKIE_SECURE:true}
      same-site: ${JWT_COOKIE_SAME_SITE:Lax}