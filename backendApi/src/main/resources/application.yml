#server:
#  address: 0.0.0.0
server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  cloud:
    gcp:
      project-id: "your-gcp-project-id"
      vertex:
        ai:
          gemini:
            location: "us-central1"
            model-name: "gemini-pro"

# OAuth configuration
oauth:
  google:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:your-google-client-id}

# CORS configuration
allowed:
  origins: ${ALLOWED_ORIGINS:http://localhost:5173}

security:
  trusted-proxy-ips: ${TRUSTED_PROXY_IPS:}
  jwt:
    token:
      secret-key: ${JWT_SECRET_KEY}
    cookie:
      secure: ${JWT_COOKIE_SECURE:false}
      same-site: ${JWT_COOKIE_SAME_SITE:Lax}

app:
  limits:
    generate-recipe-requests-per-minute: ${GENERATE_RECIPE_LIMIT_PER_MINUTE:15}
    recipe-requests-per-day:
      free: ${FREE_PLAN_RECIPE_REQUESTS_PER_DAY:${FREE_PLAN_RECIPE_LIMIT:1000}}
      paid: ${PAID_PLAN_RECIPE_REQUESTS_PER_DAY:${PAID_PLAN_RECIPE_LIMIT:-1}}

gemini:
  api:
    key: ${GEMINI_API_KEY:}
    model: ${GEMINI_API_MODEL:gemini-2.5-flash-lite}
    fallback-model: ${GEMINI_API_FALLBACK_MODEL:gemini-2.5-flash}

posthog:
  enabled: ${POSTHOG_ENABLED:false}
  host: ${POSTHOG_HOST:https://eu.i.posthog.com}
  project-key: ${POSTHOG_PROJECT_KEY:}
  connect-timeout-ms: ${POSTHOG_CONNECT_TIMEOUT_MS:2000}
  read-timeout-ms: ${POSTHOG_READ_TIMEOUT_MS:5000}
